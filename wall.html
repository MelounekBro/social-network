<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeď</title>
    <link rel="stylesheet" href="./frontend/css/style.css">
</head>
<body>
    <nav>
        <div class="logo">Social</div>
        <div class="nav-links">
            <a href="wall.html">Zeď</a>
            <a href="users.html">Uživatelé</a>
            <button id="logout-btn">Odhlásit</button>
        </div>
    </nav>
    <div class="container">
        <div class="card">
            <form id="post-form">
                <div class="form-group">
                    <label>Nadpis</label>
                    <input type="text" id="post-title" required>
                </div>
                <div class="form-group">
                    <label>Text</label>
                    <textarea id="post-content" required></textarea>
                </div>
                <button type="submit" class="btn">Přidat příspěvek</button>
            </form>
        </div>
        <div id="feed"></div>
    </div>
    <script src="./frontend/js/api.js"></script>
    <script src="./frontend/js/wall.js"></script>
</body>
</html>
